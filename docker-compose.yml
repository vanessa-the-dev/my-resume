services:
  # Production build served by nginx → http://localhost:8080
  web:
    build:
      context: .
      target: production
    image: vanessa-resume:latest
    container_name: vanessa-resume
    ports:
      - "8080:80"
    restart: unless-stopped

  # Optional dev server with hot-reload → http://localhost:5173
  # Start with:  docker compose --profile dev up dev
  dev:
    image: node:20-alpine
    container_name: vanessa-resume-dev
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
