services:
  # Production build served by nginx → http://localhost:8082
  web:
    build:
      context: .
      target: production
    image: vanessa-resume:latest
    container_name: vanessa-resume
    ports:
      - "8082:80"
    restart: unless-stopped

  # Optional dev server with hot-reload → http://localhost:5173
  # Start with:  docker compose --profile dev up dev
  dev:
    image: node:24-alpine
    container_name: vanessa-resume-dev
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      # Windows host bind mounts don't forward file-change events into the
      # Linux container, so tell Vite's watcher (chokidar) to poll instead.
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5176:5173"
    volumes:
      - .:/app
      - /app/node_modules
